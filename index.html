<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Super Upscaler Pro</title>
    
    <!-- SEO -->
    <meta name="description" content="Free professional image upscaler. Enhance photos, remove noise, and upscale up to 6x directly in your browser. No server upload required.">
    <meta name="keywords" content="image upscaler, photo enhancer, ai upscaler, resize image, batch processor, free online tool">
    <meta property="og:title" content="Super Upscaler Pro - Free Image Enhancer">
    <meta property="og:description" content="Upscale images up to 6x with smart sharpening and denoising.">
    <meta property="og:image" content="https://modul111.github.io/Super-Upscaler-Pro/icon.png">

    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Ko-fi Script -->
    <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>

    <style>
        :root {
            --kofi-color: #FFDD00; /* Жёлтый для прогресса, бейджей, кнопок масштаба */
            --bg-dark: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 700px;
            height: 95vh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow-y: auto;
        }

        @media (min-width: 768px) {
            .app-container {
                height: 90vh;
                overflow: hidden;
            }
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: var(--kofi-color); }

        .content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            position: relative;
        }
        .upload-zone:hover {
            border-color: var(--kofi-color);
            background: rgba(255, 221, 0, 0.03);
        }
        .upload-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .upload-zone:hover .upload-icon { color: var(--kofi-color); transform: translateY(-3px); }
        
        .file-count-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            background: var(--kofi-color); /* Жёлтый бейдж */
            color: black;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            display: none;
            box-shadow: 0 4px 10px rgba(255, 221, 0, 0.3);
        }

        /* Support Area with Animation */
        .support-area {
            text-align: center;
            padding: 10px 0;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.3s;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .kofi-btn-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ef25af; /* РОЗОВАЯ КНОПКА */
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(239, 37, 175, 0.3);
        }
        .kofi-btn-custom:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 20px rgba(239, 37, 175, 0.5); 
        }
        .support-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) { .controls-grid { grid-template-columns: 1fr; } }

        .panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }
        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .scale-options { display: flex; gap: 8px; }
        .scale-btn {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .scale-btn.active {
            background: var(--kofi-color); /* ЖЁЛТЫЕ АКТИВНЫЕ КНОПКИ */
            color: black;
            border-color: var(--kofi-color);
            box-shadow: 0 0 10px rgba(255, 221, 0, 0.2);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-info h4 { margin: 0 0 2px 0; font-size: 0.9rem; font-weight: 500; }
        .setting-info p { margin: 0; font-size: 0.7rem; color: var(--text-muted); }

        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3f3f46; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--kofi-color); /* ЖЁЛТЫЕ ПЕРЕКЛЮЧАТЕЛИ */ }
        input:checked + .slider:before { transform: translateX(16px); }

        .action-bar {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--surface);
        }

        .progress-wrap { display: none; }
        .progress-track {
            height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--kofi-color); /* ЖЁЛТЫЙ ПРОГРЕСС-БАР */
            transition: width 0.2s;
        }
        .status-text { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 3px; }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--text-main);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .btn-primary:hover { background: #e4e4e7; }
        .btn-primary.start { display: block; background: var(--kofi-color); /* ЖЁЛТАЯ КНОПКА START */ }
        .btn-primary.download { display: block; background: var(--accent); color: white; }

        .hidden-input { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo"><i class="fas fa-layer-group"></i> Super Upscaler</div>
        <div style="font-size: 0.75rem; color: var(--text-muted);">PRO v2.0</div>
    </header>

    <div class="content">
        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadZone">
            <div id="fileBadge" class="file-count-badge">0</div>
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <h3 style="margin:0 0 5px 0; font-size: 1.1rem;">Tap to Upload</h3>
            <p style="color:var(--text-muted); margin:0; font-size:0.85rem;">Select photos from gallery</p>
        </div>
        <input type="file" id="fileInput" class="hidden-input" multiple accept="image/*" capture="">

        <!-- Support Area with Animation -->
        <div class="support-area">
            <div class="support-text">Support the project development</div>
            <a href="https://ko-fi.com/P5P31Y57TZ" target="_blank" class="kofi-btn-custom">
                <i class="fas fa-coffee"></i> Buy me a coffee
            </a>
        </div>

        <div class="controls-grid">
            <div class="panel">
                <div class="panel-title">Upscale Factor</div>
                <div class="scale-options">
                    <button class="scale-btn active" onclick="app.setScale(2)">2x</button>
                    <button class="scale-btn" onclick="app.setScale(4)">4x</button>
                    <button class="scale-btn" onclick="app.setScale(6)">6x</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Image Processing</div>
                
                <div class="setting-row">
                    <div class="setting-info">
                        <h4>Smart Sharpen</h4>
                        <p>Restores edges</p>
                    </div>
                    <label class="switch"><input type="checkbox" id="optSharpen" checked><span class="slider"></span></label>
                </div>

                <div class="setting-row">
                    <div class="setting-info">
                        <h4>Denoise</h4>
                        <p>Removes noise</p>
                    </div>
                    <label class="switch"><input type="checkbox" id="optDenoise"><span class="slider"></span></label>
                </div>

                <div class="setting-row">
                    <div class="setting-info">
                        <h4>Vibrance</h4>
                        <p>Boosts colors</p>
                    </div>
                    <label class="switch"><input type="checkbox" id="optColor" checked><span class="slider"></span></label>
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <div class="progress-wrap" id="progressWrapper">
            <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
            <div class="status-text" id="statusText">Ready to process</div>
        </div>
        
        <button id="startBtn" class="btn-primary start" onclick="app.startProcess()">
            <i class="fas fa-magic"></i> Start Processing
        </button>
        
        <button id="downloadBtn" class="btn-primary download" onclick="app.downloadZip()">
            <i class="fas fa-download"></i> Download ZIP Archive
        </button>
    </div>
</div>

<script>
    const app = {
        scaleFactor: 2,
        files: [],
        zipBlob: null,

        init() {
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');

            uploadZone.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                this.handleFiles(e);
            });

            fileInput.addEventListener('focus', () => {
                fileInput.value = '';
            });

            fileInput.addEventListener('blur', () => {
                if (fileInput.files && fileInput.files.length > 0) {
                    this.handleFiles({ target: fileInput });
                }
            });
        },

        handleFiles(e) {
            const files = Array.from(e.target.files);
            this.files = files;
            
            const badge = document.getElementById('fileBadge');
            const uploadZoneH3 = document.querySelector('#uploadZone h3');
            const uploadZoneP = document.querySelector('#uploadZone p');

            if (files.length > 0) {
                badge.textContent = files.length;
                badge.style.display = 'block';
                uploadZoneH3.textContent = `${files.length} File${files.length > 1 ? 's' : ''} Selected`;
                uploadZoneP.textContent = "Tap to change selection";
                
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'none';
            } else {
                badge.style.display = 'none';
                uploadZoneH3.textContent = "Tap to Upload";
                uploadZoneP.textContent = "Select photos from gallery";
                document.getElementById('startBtn').style.display = 'none';
            }
        },

        setScale(val) {
            this.scaleFactor = val;
            document.querySelectorAll('.scale-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        },

        async startProcess() {
            if (this.files.length === 0) return alert("Please select images first.");

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('progressWrapper').style.display = 'block';
            
            const pBar = document.getElementById('progressBar');
            const sText = document.getElementById('statusText');

            const doSharpen = document.getElementById('optSharpen').checked;
            const doDenoise = document.getElementById('optDenoise').checked;
            const doColor = document.getElementById('optColor').checked;

            const zip = new JSZip();
            const folder = zip.folder(`Super_Upscaler_${this.scaleFactor}x`);
            folder.file("README.txt", "Generated by Super Upscaler Pro.\nThank you for supporting us on Ko-fi!");

            let processed = 0;

            try {
                for (let i = 0; i < this.files.length; i++) {
                    sText.textContent = `Processing ${i+1}/${this.files.length}...`;
                    await new Promise(r => setTimeout(r, 20));
                    
                    const blob = await this.processImage(this.files[i], this.scaleFactor, doSharpen, doDenoise, doColor);
                    const newName = this.files[i].name.replace(/\.[^/.]+$/, "") + `_x${this.scaleFactor}.png`;
                    folder.file(newName, blob);

                    processed++;
                    pBar.style.width = `${(processed / this.files.length) * 100}%`;
                }

                sText.textContent = "Compressing archive...";
                this.zipBlob = await zip.generateAsync({type: "blob"});

                sText.textContent = "Completed Successfully!";
                document.getElementById('downloadBtn').style.display = 'block';
                
            } catch (err) {
                console.error(err);
                sText.textContent = "Error during processing.";
                document.getElementById('startBtn').style.display = 'block';
            }
        },

        processImage(file, scale, sharpen, denoise, color) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        const c = document.createElement('canvas');
                        const ctx = c.getContext('2d');
                        const w = img.width * scale;
                        const h = img.height * scale;
                        c.width = w; c.height = h;

                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, w, h);

                        if (sharpen || denoise || color) {
                            let imgData = ctx.getImageData(0, 0, w, h);

                            if (denoise) {
                                imgData = this.convolve(imgData, w, h, [
                                    1/9, 1/9, 1/9,
                                    1/9, 1/9, 1/9,
                                    1/9, 1/9, 1/9
                                ]);
                            }

                            if (sharpen) {
                                const amount = scale >= 4 ? 0.9 : 0.6;
                                imgData = this.convolve(imgData, w, h, [
                                    0, -amount, 0,
                                    -amount, 1 + (4*amount), -amount,
                                    0, -amount, 0
                                ]);
                            }

                            if (color) {
                                const d = imgData.data;
                                const factor = 1.15;
                                for(let i=0; i<d.length; i+=4) {
                                    d[i] = Math.min(255, (d[i]-128)*factor + 128);
                                    d[i+1] = Math.min(255, (d[i+1]-128)*factor + 128);
                                    d[i+2] = Math.min(255, (d[i+2]-128)*factor + 128);
                                }
                            }

                            ctx.putImageData(imgData, 0, 0);
                        }

                        c.toBlob(resolve, 'image/png');
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            });
        },

        convolve(imageData, w, h, kernel) {
            const side = Math.round(Math.sqrt(kernel.length));
            const halfSide = Math.floor(side/2);
            const src = imageData.data;
            const output = new Uint8ClampedArray(src.length);
            
            for (let y = halfSide; y < h - halfSide; y++) {
                for (let x = halfSide; x < w - halfSide; x++) {
                    const dstOff = (y*w+x)*4;
                    let r=0, g=0, b=0;
                    for (let cy = 0; cy < side; cy++) {
                        for (let cx = 0; cx < side; cx++) {
                            const scy = y + cy - halfSide;
                            const scx = x + cx - halfSide;
                            const srcOff = (scy*w+scx)*4;
                            const wt = kernel[cy*side+cx];
                            r += src[srcOff] * wt;
                            g += src[srcOff+1] * wt;
                            b += src[srcOff+2] * wt;
                        }
                    }
                    output[dstOff] = r; output[dstOff+1] = g; output[dstOff+2] = b; output[dstOff+3] = 255;
                }
            }
            return new ImageData(output, w, h);
        },

        downloadZip() {
            if (!this.zipBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(this.zipBlob);
            link.download = `Super_Upscaler_Pro_Result.zip`;
            link.click();
            
            setTimeout(() => {
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'none';
                document.getElementById('progressWrapper').style.display = 'none';
                document.getElementById('progressBar').style.width = '0%';
            }, 1000);
        }
    };

    app.init();
</script>

</body>
</html>
